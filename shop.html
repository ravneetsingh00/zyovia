  <link rel="stylesheet" href="style.css" />
  <style>
    /* Amazon-like scroll for mobile */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 0 20px;
    }

    .product-card {
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      background-color: inherit;
      transition: transform 0.3s ease;
    }

    .product-card:hover {
      transform: scale(1.05);
    }

    .product-card img {
      width: 100%;
      height: auto;
      max-height: 250px;
      object-fit: cover;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .product-grid {
        display: flex;
        overflow-x: auto;
        gap: 16px;
        scroll-snap-type: x mandatory;
        padding-bottom: 20px;
      }

      .product-card {
        min-width: 70%;
        flex: 0 0 auto;
        scroll-snap-align: start;
      }
    }
  </style>
</head>
