<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product 1</title>
  <link rel="stylesheet" href="style.css" />
  <script>
function selectOption(el, group) {
  group.forEach(e => e.classList.remove('active'));
  el.classList.add('active');
}
function changeImage(src) {
  document.getElementById('mainImage').src = src;
  document.querySelectorAll('.thumbnails img').forEach(i => i.classList.remove('active'));
  event.target.classList.add('active');
}
function increaseQty() {
  let qty = document.getElementById('qty');
  qty.value = parseInt(qty.value) + 1;
}
function decreaseQty() {
  let qty = document.getElementById('qty');
  if (parseInt(qty.value) > 1) qty.value = parseInt(qty.value) - 1;
}
</script>
</head>
<body>

<header class="header">
  <h1>ZIOVIA</h1>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>
<section class="product-detail">
  <div class="product-image-frame">
    <img id="mainImage" src="images/tshirt1.jpg" alt="Product 1" />
  </div>
  <div class="thumbnails">
    <img src="images/tshirt1.jpg" class="active" onclick="changeImage('images/tshirt1.jpg')">
    <img src="images/tshirt1.jpg" onclick="changeImage('images/tshirt1.jpg')">
    <img src="images/tshirt1.jpg" onclick="changeImage('images/tshirt1.jpg')">
  </div>
  <p>This is the final version description for product 1.</p>
  <p class="price"><span class="old-price">₹699</span> <b>₹599</b></p>
  <div class="size-options">
    <div class="size-box" onclick="selectOption(this, document.querySelectorAll('.size-box'))">S</div>
    <div class="size-box" onclick="selectOption(this, document.querySelectorAll('.size-box'))">M</div>
    <div class="size-box" onclick="selectOption(this, document.querySelectorAll('.size-box'))">L</div>
    <div class="size-box" onclick="selectOption(this, document.querySelectorAll('.size-box'))">XL</div>
    <div class="size-box" onclick="selectOption(this, document.querySelectorAll('.size-box'))">2XL</div>
  </div>
  <div class="color-options">
    <div class="color-box color-black" onclick="selectOption(this, document.querySelectorAll('.color-box'))"></div>
    <div class="color-box color-white" onclick="selectOption(this, document.querySelectorAll('.color-box'))"></div>
    <div class="color-box color-red" onclick="selectOption(this, document.querySelectorAll('.color-box'))"></div>
    <div class="color-box color-green" onclick="selectOption(this, document.querySelectorAll('.color-box'))"></div>
  </div>
  <div class="quantity">
    <button onclick="decreaseQty()">-</button>
    <input type="number" id="qty" value="1" min="1">
    <button onclick="increaseQty()">+</button>
  </div>
  <input type="submit" value="Add to Cart">
  <input type="submit" value="Buy Now">

  <div class="related">
    <h3>You May Also Like</h3>
    <div class="product-grid"><div class="product-card"><a href="product2.html"><img src="images/tshirt2.jpg"><h4>Premium Tee</h4></a></div><div class="product-card"><a href="product3.html"><img src="images/tshirt3.jpg"><h4>Music Vibes Tee</h4></a></div><div class="product-card"><a href="product4.html"><img src="images/tshirt4.jpg"><h4>Classic Hoodie</h4></a></div></div>
  </div>
</section>
</body>
</html>
